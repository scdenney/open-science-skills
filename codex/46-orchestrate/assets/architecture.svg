<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img">
<title>46-orchestrate architecture: a gpt-5.6-sol orchestrator at xhigh effort reasons hard parts and delegates bounded or wide work to gpt-5.6-terra one-shots, and reaches a Fable 5 cross-vendor peer for a genuine decorrelated check on high-stakes calls.</title>
<defs><marker id="ah-o" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#C0562F"/></marker><marker id="ah-k" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#1E1E1B"/></marker></defs>
<rect x="0" y="0" width="1600" height="900" fill="#F2EEE4"/>
<rect x="240" y="300" width="440" height="280" rx="22" ry="22" fill="#C4674A" stroke="#2F2F2A" stroke-width="2.5" stroke-dasharray="7 5"/>
<text x="460" y="402" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="36" fill="#1E1E1B" font-weight="bold" text-anchor="middle">Codex orchestrator</text>
<text x="460" y="452" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="28" fill="#F7EFE2" font-style="italic" text-anchor="middle">gpt-5.6-sol &#183; xhigh</text>
<text x="460" y="500" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="20" fill="#3B2A22" font-style="italic" text-anchor="middle">reasons hard parts &#183; delegates</text>
<text x="460" y="526" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="20" fill="#3B2A22" font-style="italic" text-anchor="middle">bounded &amp; wide work</text>
<path d="M 240 360 C 160 345, 160 515, 238 500" fill="none" stroke="#1E1E1B" stroke-width="3" marker-end="url(#ah-k)"/>
<text x="180" y="548" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="22" fill="#4A4A45" font-style="italic" text-anchor="middle">main loop</text>
<rect x="1010" y="185" width="390" height="160" rx="16" ry="16" fill="#FEFDFB" stroke="#2F2F2A" stroke-width="2"/>
<text x="1205" y="255" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="30" fill="#1E1E1B" font-weight="bold" text-anchor="middle">Terra one-shot(s)</text>
<text x="1205" y="292" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="24" fill="#4A4A45" font-style="italic" text-anchor="middle">gpt-5.6-terra</text>
<text x="1205" y="322" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="19" fill="#4A4A45" font-style="italic" text-anchor="middle">bounded or wide work, one call per unit</text>
<rect x="1010" y="470" width="390" height="160" rx="16" ry="16" fill="#FEFDFB" stroke="#2F2F2A" stroke-width="2"/>
<text x="1205" y="540" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="30" fill="#1E1E1B" font-weight="bold" text-anchor="middle">Claude peer</text>
<text x="1205" y="577" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="24" fill="#4A4A45" font-style="italic" text-anchor="middle">Fable 5</text>
<text x="1205" y="607" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="19" fill="#4A4A45" font-style="italic" text-anchor="middle">cross-vendor decorrelated check</text>
<line x1="680" y1="380" x2="1010" y2="265" stroke="#C0562F" stroke-width="3" marker-end="url(#ah-o)"/>
<line x1="680" y1="470" x2="1010" y2="580" stroke="#C0562F" stroke-width="3" marker-end="url(#ah-o)"/>
<text x="845" y="280" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="22" fill="#C0562F" font-style="italic" text-anchor="middle">bounded &amp; wide work</text>
<text x="845" y="490" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="22" fill="#C0562F" font-style="italic" text-anchor="middle">high-stakes check</text>
<text x="1205" y="700" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="19" fill="#4A4A45" font-style="italic" text-anchor="middle">Both are separate, fire-and-forget calls,</text>
<text x="1205" y="724" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="19" fill="#4A4A45" font-style="italic" text-anchor="middle">not resumable sub-agents; run together,</text>
<text x="1205" y="748" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="19" fill="#4A4A45" font-style="italic" text-anchor="middle">blind to each other, on high-stakes work.</text>
<line x1="491" y1="861" x2="666" y2="861" stroke="#B9B2A0" stroke-width="1"/>
<line x1="934" y1="861" x2="1109" y2="861" stroke="#B9B2A0" stroke-width="1"/>
<text x="800" y="870" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="28" fill="#C0562F" font-style="italic" text-anchor="middle">46-orchestrate</text>
</svg>
